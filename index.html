<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">

<title>Powerbuilding</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0b;color:#e8e6e1;font-family:system-ui,-apple-system,sans-serif;max-width:460px;margin:0 auto;padding-bottom:80px}
.wstrip{display:flex;gap:5px;overflow-x:auto;padding:14px 12px 6px}

.wb.dl.on{background:#3a7bd5;border-color:#3a7bd5}

.wmeta{padding:2px 14px 8px;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#555}
.dtabs{display:flex;gap:5px;padding:0 12px 6px}
.dt{flex:1;background:#141416;border:1px solid #272729;color:#666;border-radius:8px;padding:10px 4px;font-size:13px;font-weight:700;cursor:pointer}
.dt.on{color:#e8e6e1;border-color:#e05c2a;border-width:2px}

.hcrumb{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#e05c2a;margin-bottom:8px;font-weight:600}
.htitle{font-size:24px;font-weight:800;line-height:1.1;text-transform:uppercase}
.hday{font-size:13px;color:#666;margin-top:6px}
.hnote{margin-top:10px;font-size:12px;line-height:1.5;padding:8px 10px;border-radius:8px;border:1px solid}
.hnote.dl{background:rgba(58,123,213,.08);border-color:rgba(58,123,213,.25);color:#6aa3f5}
.hnote.ts{background:rgba(39,168,106,.08);border-color:rgba(39,168,106,.25);color:#4dcf8a}
.prog{display:flex;align-items:center;gap:10px;padding:12px 14px 0}

.ptxt{font-size:12px;color:#555;min-width:44px;text-align:right}

.shbar{width:2px;height:14px;background:#e05c2a;border-radius:2px;flex-shrink:0}

.shcnt{margin-left:auto;font-size:11px;color:#444}

.wudot{width:5px;height:5px;border-radius:50%;background:#e05c2a;margin-top:7px;flex-shrink:0}
.wun{font-size:14px;font-weight:700;text-transform:uppercase}
.wut{font-size:12px;color:#666;margin-top:3px;line-height:1.4}
.wum{font-size:11px;color:#e05c2a;margin-top:3px}
.wutip{margin:2px 12px 0;font-size:11px;color:#444;font-style:italic}

.ex.done .exn{color:#27a86a}
.ex.core .exn{color:#3a7bd5}
.exname{font-size:17px;font-weight:700;line-height:1.15}
.exdesc{font-size:12px;color:#666;margin-top:4px;line-height:1.5}
.extip{font-size:11px;color:#555;margin-top:3px;font-style:italic}
.exmeta{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}

.wubox b{color:#888}
.calcbox{background:#0f1520;border-top:1px solid rgba(106,163,245,.15);padding:8px 14px;font-size:13px;color:#6aa3f5}
.calcbox b{color:#8ab8f8;font-size:15px;font-weight:700}
.loadrow{background:#1a1a1c;border-top:1px dashed #272729;padding:11px 14px 12px;display:flex;gap:8px;align-items:flex-end}
.lcol{flex:1}
.lcol.sm{flex:0 0 70px}
.lcol label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#555;margin-bottom:4px}

.lbox{position:relative}

.linput:focus{border-color:#e05c2a}

.mini{font-size:16px;font-weight:700;width:100%;background:#0a0a0b;border:1.5px solid #272729;border-radius:8px;color:#e8e6e1;text-align:center;padding:9px 4px;outline:none}
.mini:focus{border-color:#e05c2a}
.rmest{background:#0f1520;border-top:1px solid rgba(106,163,245,.15);padding:8px 14px;font-size:12px;color:#6aa3f5}
.rmest b{color:#8ab8f8;font-size:14px;font-weight:700}

.finish.rdy{border-color:rgba(39,168,106,.4);background:linear-gradient(180deg,rgba(39,168,106,.06),#141416)}
.fmsg{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:#555}
.finish.rdy .fmsg{color:#27a86a}
.fbtn{margin-top:10px;width:100%;padding:13px;border:none;border-radius:9px;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px;background:#1a1a1c;color:#444;cursor:not-allowed}
.fbtn.on{background:#27a86a;color:#071a0e;cursor:pointer}
.rmfab{position:fixed;bottom:20px;right:14px;background:#e05c2a;color:#fff;border:none;border-radius:50%;width:50px;height:50px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(224,92,42,.4);z-index:50}
.rmoverlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.rmsheet{background:#141416;border-radius:16px 16px 0 0;padding:24px 20px 40px;width:100%;max-width:460px}
.rmtitle{font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.rmsub{font-size:12px;color:#666;margin-bottom:20px;line-height:1.5}
.rmrow{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.rmlb{font-size:14px;font-weight:700;text-transform:uppercase;color:#888;flex:1}
.rminput{font-size:20px;font-weight:700;width:110px;background:#0a0a0b;border:1.5px solid #272729;border-radius:8px;color:#e8e6e1;text-align:center;padding:10px 8px;outline:none}
.rminput:focus{border-color:#e05c2a}
.rmkg{font-size:13px;color:#555}
.rmdiv{height:1px;background:#272729;margin:16px 0}
.rmsave{width:100%;padding:14px;border:none;border-radius:9px;background:#e05c2a;color:#fff;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;margin-top:8px}
.rmcancel{width:100%;padding:12px;border:none;border-radius:9px;background:transparent;color:#555;font-size:14px;cursor:pointer;margin-top:6px}
</style>
</head>
<body>
<div id="root"></div>
<button class="rmfab" id="rmfab">1RM</button>
<div class="rmoverlay" id="rmoverlay" style="display:none">
  <div class="rmsheet">
    <div class="rmtitle">I tuoi massimali</div>
    <div class="rmsub">Inserisci i 1RM. I carichi si calcolano automaticamente.</div>
    <div class="rmrow"><span class="rmlb">Back Squat</span><input class="rminput" id="rm_sq" inputmode="decimal" placeholder="0"><span class="rmkg">kg</span></div>
    <div class="rmrow"><span class="rmlb">Bench Press</span><input class="rminput" id="rm_bp" inputmode="decimal" placeholder="0"><span class="rmkg">kg</span></div>
    <div class="rmrow"><span class="rmlb">Deadlift</span><input class="rminput" id="rm_dl" inputmode="decimal" placeholder="0"><span class="rmkg">kg</span></div>
    <div class="rmrow"><span class="rmlb">Overhead Press</span><input class="rminput" id="rm_op" inputmode="decimal" placeholder="0"><span class="rmkg">kg</span></div>
    <div class="rmdiv"></div>
    <button class="rmsave" id="rmsave">Salva massimali</button>
    <button class="rmcancel" id="rmcancel">Annulla</button>
  </div>
</div>
<script>

var store={},done={},rm={sq:0,bp:0,dl:0,op:0},week=1,dayKey="FB1",warmOpen=false;

function saveAll(){
  try{window.storage.set("pb_s",JSON.stringify(store));}catch(e){try{localStorage.setItem("pb_s",JSON.stringify(store));}catch(e){}}
  try{window.storage.set("pb_d",JSON.stringify(done));}catch(e){try{localStorage.setItem("pb_d",JSON.stringify(done));}catch(e){}}
  try{window.storage.set("pb_r",JSON.stringify(rm));}catch(e){try{localStorage.setItem("pb_r",JSON.stringify(rm));}catch(e){}}
}
function loadAll(){
  function g(k){try{var r=window.storage.get(k);if(r&&r.then)return null;if(r&&r.value)return JSON.parse(r.value);}catch(e){}try{var v=localStorage.getItem(k);if(v)return JSON.parse(v);}catch(e){}return null;}
  var s=g("pb_s");if(s)store=s;
  var d=g("pb_d");if(d)done=d;
  var r=g("pb_r");if(r)rm=r;
}
function loadAsync(){
  var ps=[],keys=["pb_s","pb_d","pb_r"],vals=[null,null,null];
  try{
    keys.forEach(function(k,i){
      var p=window.storage.get(k);
      if(p&&p.then){ps.push(p.then(function(v){vals[i]=v&&v.value?JSON.parse(v.value):null;}));}
      else{if(p&&p.value)vals[i]=JSON.parse(p.value);}
    });
    if(ps.length){Promise.all(ps).then(function(){if(vals[0])store=vals[0];if(vals[1])done=vals[1];if(vals[2])rm=vals[2];render();});}
    else{render();}
  }catch(e){render();}
}

function r2(x){return x==null?null:Math.round(x/2.5)*2.5;}
function est1rm(w,reps,rpe){if(!w||!reps)return null;var rtf=Number(reps)+Math.max(0,10-(rpe==null?10:Number(rpe)));return w*(1+rtf/30);}
function calcLoad(pc,key){var v=rm[key]||0;return v>0?r2(v*pc/100):null;}
function wuStr(key){var v=rm[key]||0;if(!v)return null;function f(p){return r2(v*p);}return f(.4)+"x5 · "+f(.5)+"x4 · "+f(.6)+"x3 · "+f(.7)+"x2";}
function wuStrFromLoad(baseLoad){if(!baseLoad||baseLoad<=0)return null;function f(p){return r2(baseLoad*p);}return f(.4)+"x5 · "+f(.5)+"x4 · "+f(.6)+"x3 · "+f(.7)+"x2";}
function keyOf(wn,dk,i){return"w"+wn+"_"+dk+"_"+i;}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function prevLoad(wn,name,targetReps){
  for(var pw=wn-1;pw>=1;pw--){var wk=W[pw];if(!wk)continue;for(var dk in wk.days){var exs=W[pw].days[dk].ex;for(var i=0;i<exs.length;i++){if(exs[i].n===name){var rec=store["w"+pw+"_"+dk+"_"+i];if(rec&&rec.load){
    var prevLoad=parseFloat(rec.load);
    // se ho reps precedenti e target reps, aggiusto il carico
    if(rec.reps&&targetReps&&!isNaN(parseFloat(rec.reps))&&!isNaN(parseFloat(targetReps))){
      var prevReps=parseFloat(rec.reps);
      var tReps=parseFloat(String(targetReps).split("-")[0]);
      if(prevReps>0&&tReps>0&&prevReps!==tReps){
        var est1rm=prevLoad*(1+prevReps/30);
        var adjusted=r2(est1rm/(1+tReps/30));
        if(adjusted>0)return adjusted;
      }
    }
    return prevLoad;
  }}}}}
  return null;
}

// Esercizi senza casella peso
var NO_WEIGHT={"Dead Bug":1,"Pallof Press":1,"Side Plank (Knees)":1,"Hanging Knee Raise":1,"Hanging Leg Raise":1,"V Sit-Up":1,"Bicycle Crunch":1,"Banded Lateral Walk":1,"Squat Walk-Out":1};

var BIG={"Back Squat":"sq","Low-Bar Back Squat":"sq","Pause Deadlift":"dl","Deadlift":"dl","Conventional Deadlift":"dl","Barbell Bench Press":"bp","Pause Barbell Bench Press":"bp","Flat-Back Bench Press":"bp","Overhead Press":"op","Push Press":"op"};
var RM_LB={sq:"Back Squat",bp:"Bench Press",dl:"Deadlift",op:"Overhead Press"};

var ORDER={odd:["FB1","FB2","FB3","FB4"],even:["L1","U1","L2","U2"],test:["T1","T2","T3"]};

function render(){
  var wk=W[week],type=wk.t,order=ORDER[type];
  if(!wk.days[dayKey])dayKey=order[0];
  var day=wk.days[dayKey],exs=day.ex;
  var mainIdx=[];
  for(var i=0;i<exs.length;i++){
    if(!exs[i].isCore&&!NO_WEIGHT[exs[i].n])mainIdx.push(i);
  }
  var fc=0;
  mainIdx.forEach(function(i){var r=store[keyOf(week,dayKey,i)];if(r&&r.load&&String(r.load).trim()!=="")fc++;});
  var allF=mainIdx.length>0&&fc===mainIdx.length;
  var isDone=!!done["w"+week+"_"+dayKey];
  var H="";

  H+='<div class="wstrip">';
  for(var w in W){var wkk=W[w],n=parseInt(w);// verifica se tutti i giorni della settimana sono completati
    var worder=ORDER[wkk.t]||[];
    var wAll=worder.length>0&&worder.every(function(d){return !!done["w"+w+"_"+d];});
    H+='<button class="wb'+(n===week?" on":"")+(wkk.dl?" dl":"")+(wkk.ts?" ts":"")+'" onclick="setWeek('+w+')">'+(wAll?'<span style="color:#27a86a;margin-right:2px">✓</span>':'')+'S'+w+'</button>';}
  H+='</div><div class="wmeta">'+esc(wk.lb)+'</div>';

  H+='<div class="dtabs">';
  for(var di=0;di<order.length;di++){var dk=order[di];var dn=!!done["w"+week+"_"+dk];H+='<button class="dt'+(dk===dayKey?' on':'')+'" data-dk="'+dk+'">'+(dn?'<span class="dtick">&#10003;</span>':'')+dk+'</button>';}
  H+='</div>';

  H+='<div class="hero"><div class="hcrumb">S'+week+' &middot; '+(wk.ts?"Test":type==="odd"?"Full Body":"Upper/Lower")+'</div>';
  H+='<div class="htitle">'+esc(day.title)+'</div><div class="hday">&#128197; '+esc(day.day)+'</div>';
  if(wk.dl)H+='<div class="hnote dl">Settimana di scarico &mdash; carichi ridotti, nessun cedimento.</div>';
  if(wk.ts)H+='<div class="hnote ts">Settimana test &mdash; AMRAP al 90%. Spotter obbligatorio.</div>';
  H+='</div>';

  var pct=mainIdx.length?Math.round(fc/mainIdx.length*100):0;
  H+='<div class="prog"><div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div><div class="ptxt">'+fc+'/'+mainIdx.length+'</div></div>';

  H+='<div class="sec"><div class="sh" onclick="toggleWarm()"><span class="shbar"></span><span class="shtitle">Riscaldamento</span><span class="shcnt">'+(warmOpen?"&#9652; chiudi":"&#9662; apri")+'</span></div>';
  if(warmOpen){
    H+='<div class="wu"><span class="wudot"></span><div><div class="wun">Low Intensity Cardio</div><div class="wut">Cyclette o tapis. 100-135 bpm fino a leggera sudata.</div><div class="wum">5-10 min</div></div></div>';
    H+='<div class="wu"><span class="wudot"></span><div><div class="wun">Foam Rolling</div><div class="wut">Zone di oggi, passaggi lenti sui punti tesi.</div><div class="wum">2-3 min</div></div></div>';
    H+='<div class="wu"><span class="wudot"></span><div><div class="wun">Attivazione dinamica</div><div class="wut">Leg swing, glute squeeze, band pull-apart, rotazioni di cuffia.</div><div class="wum">3-5 min</div></div></div>';

    H+='<div class="wutip">Poco tempo? Taglia cardio e foam rolling, non la piramide.</div>';
  }
  H+='</div>';

  var seenBig={};
  H+='<div class="sec"><div class="sh" style="cursor:default"><span class="shbar"></span><span class="shtitle">Esercizi</span><span class="shcnt">'+exs.length+' esercizi</span></div>';
  for(var i=0;i<exs.length;i++){
    var e=exs[i],k=keyOf(week,dayKey,i),rec=store[k]||{};
    var noWeight=!!NO_WEIGHT[e.n]||e.isCore;
    var hasWeight=!e.isCore&&!noWeight;
    var filled=hasWeight&&rec.load&&String(rec.load).trim()!=="";
    var ghost=hasWeight&&!filled?prevLoad(week,e.n,e.reps):null;
    var bigKey=BIG[e.n];
    var calcLd=bigKey&&e.pc?calcLoad(e.pc,bigKey):null;
    var wuS=bigKey&&e.pc?wuStr(bigKey):null;
    var e1=hasWeight&&bigKey&&rec.load&&rec.reps?est1rm(parseFloat(rec.load),parseFloat(rec.reps),null):null;
    var cls="ex"+(filled?" done":"")+(e.isCore?" core":"");
    var numLbl=e.isCore?"&#9670;":(i+1);

    H+='<div class="'+cls+'"><div class="extop"><div class="exn">'+numLbl+'</div><div style="flex:1">';
    H+='<div class="exname">'+esc(e.n)+'</div>';
    // descrizione unica
    var desc=GUIDE[e.n]||"";
    if(desc)H+='<div class="exdesc">'+esc(desc)+'</div>';
    // extip rimosso - una sola descrizione
    H+='<div class="exmeta">';
    H+='<span class="tag"><b>'+e.sets+'</b> set</span><span class="tag"><b>'+esc(String(e.reps))+'</b> reps</span>';
    if(e.pl&&e.pl!=="—")H+='<span class="tag pct">'+esc(e.pl)+'</span>';
    if(e.rpe!=null)H+='<span class="tag rpe">RPE '+e.rpe+'</span>';
    H+='<span class="tag">&#8987; '+esc(e.rest)+'</span>';
    H+='</div></div></div>';

    // avvicinamento: solo per il primo esercizio Big 3 nella sessione
    var isFirstBig=bigKey&&e.pc&&!seenBig[bigKey];
    if(isFirstBig)seenBig[bigKey]=true;
    if(isFirstBig){
      // priorita: carico inserito ora > carico reale aggiustato (ghost) > carico calcolato dal 1RM > 1RM grezzo
      var wuBase=null;
      if(rec.load&&parseFloat(rec.load)>0)wuBase=parseFloat(rec.load);
      else if(ghost&&parseFloat(ghost)>0)wuBase=parseFloat(ghost);
      else if(calcLd&&calcLd>0)wuBase=calcLd;
      var wuFinal=wuBase?wuStrFromLoad(wuBase):wuS;
      if(wuFinal)H+='<div class="wubox">Bar x15 poi: <b>'+esc(wuFinal)+'</b></div>';
      else H+='<div class="wubox" style="color:#e05c2a">Inserisci il 1RM per vedere i carichi</div>';
    }
    // calcLd usato come placeholder sotto

    if(hasWeight){
      var ph=ghost?ghost:(calcLd?calcLd+'':null);
      H+='<div class="loadrow"><div class="lcol"><label>Carico</label><div class="lbox"><input class="linput'+(filled?" filled":"")+'" type="text" inputmode="decimal" data-k="'+k+'" data-f="load" placeholder="'+(ph||"—")+'" value="'+esc(rec.load||"")+'"><span class="lunit">kg</span></div></div></div>';
    }
    if(e1)H+='<div class="rmest">1RM stimato: <b>'+r2(e1)+' kg</b> &nbsp;&middot;&nbsp; 80% &asymp; '+r2(e1*.8)+' &middot; 70% &asymp; '+r2(e1*.7)+'</div>';
    H+='</div>';
  }
  H+='</div>';

  H+='<div class="finish'+(allF||isDone?" rdy":"")+'">';
  H+='<div class="fmsg">'+(isDone?"Sessione completata &#10003;":(allF?"Tutti i principali compilati &mdash; fatto!":"Compila i carichi per completare"))+'</div>';
  H+='<button class="fbtn'+(allF||isDone?" on":"")+'" '+(allF||isDone?"":"disabled")+' onclick="toggleDone()">'+(isDone?"&#10003; Completata &mdash; tap per annullare":"&#10003; Segna come completata")+'</button>';
  H+='</div>';

  document.getElementById("root").innerHTML=H;

  document.querySelectorAll(".dt[data-dk]").forEach(function(btn){
    btn.addEventListener("click",function(){setDay(this.getAttribute("data-dk"));});
  });
  var ins=document.querySelectorAll("input[data-k]");
  for(var j=0;j<ins.length;j++){
    ins[j].addEventListener("input",function(){
      var k=this.getAttribute("data-k"),f=this.getAttribute("data-f");
      if(!store[k])store[k]={};
      store[k][f]=this.value;
      saveAll();
      if(f==="load"){
        var card=this.closest(".ex");
        if(this.value.trim()!==""){this.classList.add("filled");if(card)card.classList.add("done");}
        else{this.classList.remove("filled");if(card)card.classList.remove("done");}
        var mi=[];for(var ii=0;ii<day.ex.length;ii++){if(!day.ex[ii].isCore&&!NO_WEIGHT[day.ex[ii].n])mi.push(ii);}
        var fc2=0;mi.forEach(function(ii){var r=store[keyOf(week,dayKey,ii)];if(r&&r.load&&String(r.load).trim()!=="")fc2++;});
        var pf=document.querySelector(".pfill"),pt=document.querySelector(".ptxt");
        if(pf)pf.style.width=(mi.length?Math.round(fc2/mi.length*100):0)+"%";
        if(pt)pt.textContent=fc2+"/"+mi.length;
      }
    });
    ins[j].addEventListener("blur",function(){render();});
  }
}

function setWeek(w){week=parseInt(w);var o=ORDER[W[week].t];if(!W[week].days[dayKey])dayKey=o[0];render();window.scrollTo(0,0);}
function setDay(d){dayKey=d;render();window.scrollTo(0,0);}
function toggleWarm(){warmOpen=!warmOpen;render();}
function toggleDone(){var k="w"+week+"_"+dayKey;done[k]=!done[k];saveAll();render();}

document.getElementById("rmfab").onclick=function(){
  document.getElementById("rm_sq").value=rm.sq||"";
  document.getElementById("rm_bp").value=rm.bp||"";
  document.getElementById("rm_dl").value=rm.dl||"";
  document.getElementById("rm_op").value=rm.op||"";
  document.getElementById("rmoverlay").style.display="flex";
};
document.getElementById("rmoverlay").onclick=function(e){if(e.target===this)this.style.display="none";};
document.getElementById("rmcancel").onclick=function(){document.getElementById("rmoverlay").style.display="none";};
document.getElementById("rmsave").onclick=function(){
  rm={sq:parseFloat(document.getElementById("rm_sq").value)||0,bp:parseFloat(document.getElementById("rm_bp").value)||0,dl:parseFloat(document.getElementById("rm_dl").value)||0,op:parseFloat(document.getElementById("rm_op").value)||0};
  saveAll();document.getElementById("rmoverlay").style.display="none";render();
};

loadAll();
loadAsync();
window.addEventListener("beforeunload",saveAll);
</script>
